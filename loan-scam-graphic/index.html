let currentGraphic = graphics[0];
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Build tabs
const tabsEl = document.getElementById("tabs");
graphics.forEach((g, i) => {
  const tab = document.createElement("div");
  tab.className = "tab" + (i === 0 ? " active" : "");
  tab.textContent = g.label;
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentGraphic = g;
    drawGraphic(g);
    updateCaption(g);
  };
  tabsEl.appendChild(tab);
});

function drawGraphic(g) {
  const W = 1080, H = 1080;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(0, 0, W, H);

  // Top accent
  ctx.fillStyle = g.color;
  ctx.fillRect(0, 0, W, 8);

  // Side accent
  ctx.fillStyle = g.color;
  ctx.fillRect(0, 0, 8, H);

  // Subtle grid pattern
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Emoji big
  ctx.font = "130px serif";
  ctx.fillText(g.emoji, 50, 185);

  // Headline
  ctx.fillStyle = g.color;
  ctx.font = "bold 110px 'Black Han Sans', sans-serif";
  ctx.fillText(g.headline, 50, 310);

  // Subhead
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 46px 'Barlow', sans-serif";
  wrapText(ctx, g.subhead, 50, 380, W - 100, 56);

  // Divider line
  ctx.strokeStyle = g.color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(50, 420);
  ctx.lineTo(W - 50, 420);
  ctx.stroke();

  // Points
  ctx.font = "bold 36px 'Barlow', sans-serif";
  g.points.forEach((point, i) => {
    const y = 490 + (i * 72);
    // Bullet
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.arc(70, y - 12, 10, 0, Math.PI * 2);
    ctx.fill();
    // Text
    ctx.fillStyle = "#f5f5f0";
    ctx.fillText(point, 100, y);
  });

  // Warning bar
  ctx.fillStyle = g.color;
  ctx.fillRect(0, H - 180, W, 80);
  ctx.fillStyle = "#000000";
  ctx.font = "bold 32px 'Barlow', sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(g.warning, W / 2, H - 128);
  ctx.textAlign = "left";

  // URL watermark bottom
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(0, H - 100, W, 100);

  ctx.fillStyle = "#555";
  ctx.font = "bold 28px 'Barlow', sans-serif";
  ctx.fillText("FREE HELP:", 50, H - 58);
  ctx.fillStyle = g.color;
  ctx.font = "bold 32px 'Barlow', sans-serif";
  ctx.fillText(g.url, 220, H - 58);

  // QR placeholder box
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.strokeRect(W - 130, H - 120, 90, 90);
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(W - 130, H - 120, 90, 90);
  ctx.fillStyle = "#444";
  ctx.font = "bold 14px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("SCAN", W - 85, H - 70);
  ctx.fillText("ME", W - 85, H - 52);
  ctx.textAlign = "left";

  // Draw mini QR using qrcode lib into offscreen canvas
  const qrDiv = document.createElement("div");
  qrDiv.style.position = "absolute";
  qrDiv.style.left = "-9999px";
  document.body.appendChild(qrDiv);

  try {
    new QRCode(qrDiv, {
      text: "https://" + g.url,
      width: 90,
      height: 90,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => {
      const qrImg = qrDiv.querySelector("img") || qrDiv.querySelector("canvas");
      if (qrImg) {
        const tempImg = new Image();
        tempImg.crossOrigin = "anonymous";
        tempImg.onload = () => {
          ctx.drawImage(tempImg, W - 128, H - 118, 86, 86);
        };
        tempImg.src = qrImg.src || (qrImg.toDataURL ? qrImg.toDataURL() : "");
      }
      document.body.removeChild(qrDiv);
    }, 300);
  } catch(e) {
    document.body.removeChild(qrDiv);
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";
  for (let w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, y);
      line = w;
      y += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
  return y;
}

function updateCaption(g) {
  document.getElementById("captionText").textContent = g.caption;
}

function copyCaption() {
  navigator.clipboard.writeText(currentGraphic.caption).then(() => {
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "✅ Copied!";
    setTimeout(() => btn.textContent = "Copy Caption", 2000);
  });
}

function downloadGraphic() {
  const link = document.createElement("a");
  link.download = currentGraphic.id + "-scam-alert.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function downloadStory() {
  // Create 9:16 version
  const storyCanvas = document.createElement("canvas");
  storyCanvas.width = 1080;
  storyCanvas.height = 1920;
  const sCtx = storyCanvas.getContext("2d");

  sCtx.fillStyle = "#0a0a0a";
  sCtx.fillRect(0, 0, 1080, 1920);

  // Draw main graphic centered
  sCtx.drawImage(canvas, 0, 420, 1080, 1080);

  // Top text
  sCtx.fillStyle = currentGraphic.color;
  sCtx.font = "bold 52px sans-serif";
  sCtx.textAlign = "center";
  sCtx.fillText("SAVE THIS. SHARE THIS.", 540, 200);
  sCtx.fillStyle = "#888";
  sCtx.font = "36px sans-serif";
  sCtx.fillText("Someone you know needs it.", 540, 270);
  sCtx.textAlign = "left";

  const link = document.createElement("a");
  link.download = currentGraphic.id + "-story.png";
  link.href = storyCanvas.toDataURL("image/png");
  link.click();
}
